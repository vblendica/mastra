name: PR Triage

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - edited
      - synchronize

permissions:
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  check-permission:
    if: ${{ github.repository == 'mastra-ai/mastra' && github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
    steps:
      - name: Checkout (sparse — only .github/actions)
        uses: actions/checkout@v5
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false
      - name: Generate GitHub App token
        id: app_token
        uses: ./.github/actions/app-auth
        with:
          app-id: ${{ vars.DANE_APP_ID }}
          private-key: ${{ secrets.DANE_APP_PRIVATE_KEY }}
      - name: Check PR author org membership
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const username = context.payload.pull_request.user.login;

            try {
              await github.rest.orgs.checkMembershipForUser({
                org: context.repo.owner,
                username,
              });
              core.setOutput('authorized', 'true');
              core.info(`PR author ${username} is an org member`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`PR author ${username} is not an org member`);
                core.setOutput('authorized', 'false');
                return;
              }
              throw error;
            }
  comment:
    needs: check-permission
    if: needs.check-permission.outputs.authorized == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (sparse — only .github/actions)
        uses: actions/checkout@v5
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Generate GitHub App token
        id: app_token
        uses: ./.github/actions/app-auth
        with:
          app-id: ${{ vars.DANE_APP_ID }}
          private-key: ${{ secrets.DANE_APP_PRIVATE_KEY }}
      - name: Add comment
        uses: mshick/add-pr-comment@v2
        with:
          issue: ${{ github.event.pull_request.number }}
          message-id: external-contributor-triage
          repo-token: ${{ steps.app_token.outputs.token }}
          message: |
            Thank you for your contribution!

            Your PR needs to fix an existing issue. You are required to link issues (e.g. with `Fixes #1234`, `Closes #1234`) in your PR description. PRs without a linked issue may be closed.

            Mastra uses CodeRabbit for automated code reviews. Please address all feedback from CodeRabbit by either making changes to your PR or leaving a comment explaining why you disagree with the feedback. Since CodeRabbit is an AI, it may occasionally provide incorrect feedback.

            Addressing CodeRabbit's feedback will greatly increase the chances of your PR being merged. We appreciate your understanding and cooperation in helping us maintain high code quality standards.
